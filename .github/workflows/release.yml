name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: |
          dotnet publish src/TreeSync \
            -c Release \
            -o publish

      - name: Package
        run: |
          cd publish
          zip -r ../TreeSync-${GITHUB_REF_NAME}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            TreeSync-${GITHUB_REF_NAME}.zip