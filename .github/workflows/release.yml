name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must match vMAJOR.MINOR.PATCH. Got '$tag'."
          }

          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip_name=TreeSync-$version-win-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore TreeSync.sln

      - name: Build
        run: dotnet build TreeSync.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test TreeSync.sln --configuration Release --no-build

      - name: Publish win-x64
        run: >
          dotnet publish src/TreeSync.Cli/TreeSync.Cli.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:DebugType=none
          -p:DebugSymbols=false
          -p:InformationalVersion=${{ steps.version.outputs.version }}
          --output artifacts/publish/win-x64

      - name: Smoke test
        shell: pwsh
        run: .\artifacts\publish\win-x64\TreeSync.exe --help

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/package, dist | Out-Null
          Copy-Item artifacts/publish/win-x64/TreeSync.exe artifacts/package/
          Copy-Item README.md artifacts/package/
          Compress-Archive `
            -Path artifacts/package/* `
            -DestinationPath "dist/${{ steps.version.outputs.zip_name }}" `
            -Force

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: TreeSync ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: false
          body: |
            Draft release for TreeSync ${{ steps.version.outputs.version }}.

            Review release notes manually against CHANGELOG.md before publishing.
          files: dist/${{ steps.version.outputs.zip_name }}
          fail_on_unmatched_files: true
